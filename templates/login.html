<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Resume Analyzer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png"
          href="{{ url_for('static', filename='logo.png') }}">
</head>

<body class="{% if session.get('dark') %}dark-mode{% endif %}">

    <nav style="display:flex; align-items:center; justify-content:space-between; background:#2563eb; padding:10px 20px;">

        <!-- LEFT SIDE -->
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="{{ url_for('static', filename='logo.jpeg') }}"
                 style="width:45px; height:45px; border-radius:8px;">
            <h2 style="color:white;">AI Resume Analyzer</h2>
        </div>

        <!-- RIGHT SIDE -->
        <div>
            <a href="/dashboard" style="color:white; margin-right:15px;">Dashboard</a>
            <a href="/profile" style="color:white; margin-right:15px;">Profile</a>
            <a href="/logout" style="color:white;">Logout</a>
        </div>

    </nav>

    <div class="container">

        <div class="card">

            <h1>Login</h1>

            <form method="POST">

                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       class="input-box"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       class="input-box"
                       required>

                <!-- 👑 ADMIN LOGIN OPTION -->
                <label style="display:flex; align-items:center; gap:8px; margin-top:10px;">
                    <input type="checkbox" name="is_admin">
                    <span>Login as Admin</span>
                </label>

                <button class="btn" style="margin-top:15px;">
                    Login
                </button>

            </form>

            {% if error %}
            <p style="color:red; margin-top:15px;">
                {{ error }}
            </p>
            {% endif %}

            <br>

            <p>
                Don't have an account?
                <a href="/register">Register Here</a>
            </p>

        </div>

    </div>

</body>
</html>
