<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - AI Resume Analyzer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png"
          href="{{ url_for('static', filename='logo.png') }}">
</head>

<body class="{% if session.get('dark') %}dark-mode{% endif %}">

    <!-- Navbar -->

    <nav style="display:flex; align-items:center; justify-content:space-between; background:#2563eb; padding:10px 20px;">

        <!-- LEFT SIDE: LOGO + TITLE -->
        <div style="display:flex; align-items:center; gap:10px;">
    
            <img src="{{ url_for('static', filename='logo.jpeg') }}"
                 style="width:45px; height:45px; border-radius:8px;">
    
            <h2 style="color:white;">AI Resume Analyzer</h2>
    
        </div>
    
        <!-- RIGHT SIDE LINKS -->
        <div>
    
            <a href="/dashboard" style="color:white; margin-right:15px;">Dashboard</a>
            <a href="/profile" style="color:white; margin-right:15px;">Profile</a>
            <a href="/logout" style="color:white;">Logout</a>
    
        </div>
    
    </nav>

    <!-- Register Form -->

    <div class="container">

        <div class="card">

            <h1>Create Account</h1>

            <p style="text-align:center; margin-bottom:20px;">
                Register to access Resume Analysis,
                ATS Checker and Interview Preparation.
            </p>

            <form method="POST">

                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       class="input-box"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Enter Email"
                       class="input-box"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       class="input-box"
                       required>

                <input type="password"
                       name="confirm_password"
                       placeholder="Confirm Password"
                       class="input-box"
                       required>

                <button type="submit"
                        class="btn">

                    Register

                </button>

            </form>

            {% if error %}

            <p style="color:red;
                      text-align:center;
                      margin-top:15px;">

                {{ error }}

            </p>

            {% endif %}

            <br>

            <p style="text-align:center;">

                Already have an account?

                <a href="/login">

                    Login Here

                </a>

            </p>

        </div>

    </div>

    <!-- Footer -->

    <div class="footer">

        <p>

            © 2026 AI Resume Analyzer & Job Recommendation System

        </p>

    </div>

</body>

</html>
