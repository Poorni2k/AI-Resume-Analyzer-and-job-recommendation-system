<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Change Password - AI Resume Analyzer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

</head>

<body class="{% if session.get('dark') %}dark-mode{% endif %}">

<!-- NAVBAR (same as dashboard) -->
<nav style="display:flex; align-items:center; justify-content:space-between; background:#2563eb; padding:10px 20px;">

    <div style="display:flex; align-items:center; gap:10px;">

        <img src="{{ url_for('static', filename='logo.jpeg') }}"
             style="width:45px; height:45px; border-radius:8px;">

        <h2 style="color:white;">AI Resume Analyzer</h2>

    </div>

    <div>

        <a href="/dashboard" style="color:white; margin-right:15px;">Dashboard</a>
        <a href="/profile" style="color:white; margin-right:15px;">Profile</a>
        <a href="/logout" style="color:white;">Logout</a>

    </div>

</nav>

<!-- PAGE TITLE -->
<h1 style="text-align:center; margin-top:30px;">🔐 Settings - Change Password</h1>

<p style="text-align:center; color:gray;">
    Update your account password securely
</p>

<!-- CENTER CARD -->
<div style="display:flex; justify-content:center; margin-top:40px;">

    <div class="feature-card" style="width:400px;">

        <h2 style="text-align:center;">Change Password</h2>

        {% if error %}
        <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        {% if success %}
        <p style="color:green; text-align:center;">{{ success }}</p>
        {% endif %}

        <form action="/change_password" method="POST">

            <input type="password" name="old_password" placeholder="Old Password" required
                   style="width:100%; padding:10px; margin:10px 0;">

            <input type="password" name="new_password" placeholder="New Password" required
                   style="width:100%; padding:10px; margin:10px 0;">

            <button type="submit" class="btn" style="width:100%;">
                Update Password
            </button>

        </form>

    </div>

</div>

<!-- FOOTER -->
<div class="footer" style="margin-top:60px;">
    <p>© 2026 AI Resume Analyzer & Job Recommendation System</p>
</div>

</body>
</html>
